<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MassMash AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 30%, #4c1d95 70%, #581c87 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: white;
      overflow: hidden;
    }
    .logo-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
    }
    .logo-ring {
      position: absolute;
      inset: 0;
      border: 3px solid rgba(139, 92, 246, 0.3);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
    }
    .logo-ring-outer {
      position: absolute;
      inset: -12px;
      border: 2px solid rgba(99, 102, 241, 0.2);
      border-bottom-color: #818cf8;
      border-radius: 50%;
      animation: spin 2.5s linear infinite reverse;
    }
    .logo-icon {
      position: absolute;
      inset: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(135deg, #c084fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #e0e7ff, #c7d2fe, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 14px;
      color: #a5b4fc;
      margin-bottom: 40px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .progress-bar {
      width: 240px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #818cf8, #a78bfa, #c084fc);
      border-radius: 2px;
      animation: loading 1.8s ease-in-out infinite;
    }
    @keyframes loading {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }
    .status {
      margin-top: 16px;
      font-size: 12px;
      color: #7c7dbd;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    .version {
      position: absolute;
      bottom: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="logo-ring-outer"></div>
    <div class="logo-ring"></div>
    <div class="logo-icon">MM</div>
  </div>
  <h1>MassMash AI</h1>
  <p class="subtitle">Desktop Client</p>
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
  <p class="status">Backend wird gestartet...</p>
  <p class="version">v1.0.0</p>
</body>
</html>
